name: 'unit test'

on:
  workflow_call:
    inputs:
      vllm:
        required: true
        type: string
      runner:
        required: true
        type: string
      image:
        required: true
        type: string
      type:
        required: true
        type: string
    secrets:
      CODECOV_TOKEN:
        required: false
      VLLM_ASCEND_HUST_BENCHMARK_SSH_KEY:
        required: false

jobs:
  unit-test:
    name: unit test
    runs-on: ${{ inputs.runner }}
    env:
      HOME: ${{ github.workspace }}
      CHECKOUT_USE_SSH_443: ${{ secrets.VLLM_ASCEND_HUST_BENCHMARK_SSH_KEY != '' && '1' || '0' }}
    container:
      image: ${{ inputs.image }}
      env:
        VLLM_LOGGING_LEVEL: ERROR
        VLLM_USE_MODELSCOPE: True
        SOC_VERSION: ascend910b1
        MAX_JOBS: 4
        COMPILE_CUSTOM_KERNELS: 0
        UV_INDEX_URL: https://mirrors.huaweicloud.com/repository/pypi/simple
        UV_EXTRA_INDEX_URL: https://mirrors.huaweicloud.com/ascend/repos/pypi
        UV_INDEX_STRATEGY: unsafe-best-match
        UV_NO_CACHE: 1
        UV_SYSTEM_PYTHON: 1
        UV_PYTHON: python3
    steps:
      - name: Install packages
        run: |
          sed -Ei 's@(ports|archive).ubuntu.com@mirrors.huaweicloud.com@g' /etc/apt/sources.list
          pip config set global.index-url https://mirrors.huaweicloud.com/repository/pypi/simple
          pip config set global.trusted-host mirrors.huaweicloud.com
          apt-get update -y
          apt-get install -y python3-pip git vim wget net-tools gcc g++ cmake libnuma-dev curl gnupg2
          git config --global --add safe.directory /__w/vllm-ascend-hust/vllm-ascend-hust
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          pip install uv

      - name: Configure GitHub SSH over 443
        if: ${{ env.CHECKOUT_USE_SSH_443 == '1' }}
        run: |
          mkdir -p "$HOME/.ssh"
          chmod 700 "$HOME/.ssh"
          printf '%s\n' '${{ secrets.VLLM_ASCEND_HUST_BENCHMARK_SSH_KEY }}' > "$HOME/.ssh/github_actions"
          chmod 600 "$HOME/.ssh/github_actions"
          cat > "$HOME/.ssh/config" <<'EOF'
          Host github.com
            HostName ssh.github.com
            Port 443
            User git
            HostKeyAlias github.com
            IdentityFile ~/.ssh/github_actions
            IdentitiesOnly yes
            StrictHostKeyChecking no
          EOF
          chmod 600 "$HOME/.ssh/config"
          git config --global url."ssh://git@ssh.github.com:443/".insteadOf https://github.com/

      - name: Checkout vllm-project/vllm repo
        uses: actions/checkout@v6
        with:
          repository: vllm-project/vllm
          ref: ${{ inputs.vllm }}
          path: ./vllm-empty
          ssh-key: ${{ secrets.VLLM_ASCEND_HUST_BENCHMARK_SSH_KEY }}
          ssh-strict: ${{ env.CHECKOUT_USE_SSH_443 != '1' }}
          persist-credentials: false

      - name: Install vllm-project/vllm from source
        working-directory: ./vllm-empty
        run: |
          VLLM_TARGET_DEVICE=empty uv pip install . --extra-index-url https://download.pytorch.org/whl/cpu/
          uv pip uninstall triton

      - name: Checkout vllm-project/vllm-ascend repo
        uses: actions/checkout@v6
        with:
          ssh-key: ${{ secrets.VLLM_ASCEND_HUST_BENCHMARK_SSH_KEY }}
          ssh-strict: ${{ env.CHECKOUT_USE_SSH_443 != '1' }}
          persist-credentials: false

      - name: Install vllm-project/vllm-ascend
        run: |
          pip install uc-manager
          ascend_arch=$(uname -m)
          export LD_LIBRARY_PATH="${LD_LIBRARY_PATH}:/usr/local/Ascend/ascend-toolkit/latest/${ascend_arch}-linux/devlib"
          uv pip install -v . --extra-index-url https://download.pytorch.org/whl/cpu/
          uv pip install -r requirements-dev.txt --extra-index-url https://download.pytorch.org/whl/cpu/

      - name: Run unit test
        env:
          VLLM_WORKER_MULTIPROC_METHOD: spawn
          TORCH_DEVICE_BACKEND_AUTOLOAD: 0
        shell: bash
        run: |
          ascend_arch=$(uname -m)
          export LD_LIBRARY_PATH="${LD_LIBRARY_PATH}:/usr/local/Ascend/ascend-toolkit/latest/${ascend_arch}-linux/devlib"
          set -o pipefail
          pytest -sv --cov --cov-report=xml:unittests-coverage.xml tests/ut \
            --ignore tests/ut/model_loader/netloader/test_netloader_elastic.py \
            --ignore tests/ut/kv_connector/test_remote_prefill_lifecycle.py \
            --ignore tests/ut/kv_connector/test_remote_decode_lifecycle.py \
            --ignore tests/ut/core/test_scheduler_dynamic_batch.py \
            --ignore tests/ut/kv_connector/test_mooncake_connector.py \
            --ignore tests/ut/worker/test_worker_v1.py \
            --ignore tests/ut/spec_decode/test_mtp_proposer.py \
            --ignore tests/ut/kv_connector/test_mooncake_layerwise_connector.py \
            2>&1 | tee /tmp/unit-test.log
          exit "${PIPESTATUS[0]}"

      - name: Summarize unit test failure
        if: ${{ always() }}
        run: |
          python3 .github/workflows/scripts/ci_log_summary.py \
            --mode ut \
            --step-name "Run unit test" \
            --log-file /tmp/unit-test.log \
            --output "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage to Codecov
        # only upload coverage when commits merged
        if: ${{ inputs.type == 'schedule' }}
        uses: codecov/codecov-action@v5
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        with:
          flags: unittests
          name: vllm-ascend
          verbose: true
